# ============================================================
# QUANTARA — Dashboard Admin (Next.js :4240)
# https://juniari.com/quantara → proxy → Next.js sur port 4240
#
# À ajouter dans httpd-vhosts.conf
# ============================================================

# --- HTTP → HTTPS redirect ---
<VirtualHost *:80>
    ServerName juniari.com
    ServerAlias www.juniari.com
    ProxyPreserveHost On

    # ACME challenge pour Let's Encrypt (ne pas proxyer)
    Alias /.well-known/ "C:/xampp/htdocs/.well-known/"
    <Directory "C:/xampp/htdocs/.well-known">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Rediriger HTTP → HTTPS (sauf ACME challenge)
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^(.*)$ https://juniari.com%{REQUEST_URI} [R=301,L]

    ErrorLog "logs/juniari-quantara-error.log"
    CustomLog "logs/juniari-quantara-access.log" combined
</VirtualHost>

# --- HTTPS ---
<VirtualHost *:443>
    ServerName juniari.com
    ServerAlias www.juniari.com
    ProxyPreserveHost On

    SSLEngine on
    SSLCertificateFile "C:/xampp/apache/conf/ssl/juniari.com-crt.pem"
    SSLCertificateKeyFile "C:/xampp/apache/conf/ssl/juniari.com-key.pem"
    SSLCertificateChainFile "C:/xampp/apache/conf/ssl/juniari.com-chain-only.pem"

    # ACME challenge
    Alias /.well-known/ "C:/xampp/htdocs/.well-known/"
    <Directory "C:/xampp/htdocs/.well-known">
        Options None
        AllowOverride None
        Require all granted
    </Directory>
    ProxyPass /.well-known !

    # ─── Quantara Dashboard (Next.js sur port 4240) ───────────
    # Ressources statiques Next.js /_next/ (le basePath de Next.js ajoute /quantara automatiquement)
    ProxyPass /quantara/_next/ http://127.0.0.1:4240/quantara/_next/
    ProxyPassReverse /quantara/_next/ http://127.0.0.1:4240/quantara/_next/

    # WebSocket pour Next.js HMR (dev mode uniquement)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/quantara/(.*)$ ws://127.0.0.1:4240/quantara/$1 [P,L]

    # Toutes les routes /quantara/* → Next.js
    ProxyPass /quantara http://127.0.0.1:4240/quantara
    ProxyPassReverse /quantara http://127.0.0.1:4240/quantara

    # Racine juniari.com → 404 ou redirection (à personnaliser)
    # Par défaut on ne fait rien pour les autres chemins
    # ProxyPass / http://127.0.0.1:XXXX/ # <- autre app si besoin

    ErrorLog "logs/juniari-quantara-ssl-error.log"
    CustomLog "logs/juniari-quantara-ssl-access.log" combined
</VirtualHost>
